version: "3.7"

services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    container_name: spudy_app_proxy
    environment:
      APP_HOST: spudy_server
      APP_PORT: 4000
    networks:
      - spudy_network
    depends_on:
      - server

  server:
    image: "jermorg/spudy@sha256:98229256ca7f6a5a5c730e60172a8d130e26609df9e71434c9905cdc62aa1a2d"
    container_name: spudy_server
    restart: always
    environment:
      - PORT=4000
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"
    networks:
      - spudy_network

networks:
  spudy_network:
    driver: bridge