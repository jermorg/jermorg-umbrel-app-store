version: "3.7"

services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    container_name: spudy_app_proxy
    environment:
      APP_HOST: spudy_server
      APP_PORT: 4000
    networks:
      - spudy_network
    depends_on:
      - server

  server:
    image: "jermorg/spudy@sha256:0e43862414f6053f53b6ccdefeea49a65530e02520eb9c4bb96c68a9573300e2"
    container_name: spudy_server
    command: ["sh", "-c", "node web.js & node index.js"]
    restart: always
    environment:
      - PORT=4000
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"
    networks:
      - spudy_network

networks:
  spudy_network:
    driver: bridge