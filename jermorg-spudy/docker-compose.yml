version: "3.7"

services:
  app_proxy:
    image: getumbrel/app-proxy:1.7.0
    container_name: spudy_app_proxy
    environment:
      APP_HOST: spudy_server
      APP_PORT: 4000
    networks:
      - spudy_network
    depends_on:
      - server

  server:
    image: "jermorg/spudy@sha256:91f94498646b46400141eb307e35e4e0da750cec1be102922458a6d2a9b6e9a7"
    container_name: spudy_server
    restart: always
    environment:
      - PORT=4000
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"
    networks:
      - spudy_network

networks:
  spudy_network:
    driver: bridge